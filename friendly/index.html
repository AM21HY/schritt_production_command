<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>友好MOBコマンド</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .top-nav {
    display: flex;
    align-items: center;
    gap: 30px;
    padding: 10px 20px 30px 20px;
  }
  .left-logo { height: 50px; }
  .menu-icon { height: 150px; }
  .container {
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
  }
  .card {
    background: #fff;
    padding: 30px 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    text-align: left;
  }
  .title-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1px;
  }
  .title-logo-big {
    height: 180px;
    display: block;
  }
  select {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    font-size: 15px;
  }
  button.button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    background-color: #2196F3;
    color: #fff;
    cursor: pointer;
  }
  .copy-btn {
    background: #4CAF50;
    color: #fff;
    padding: 8px 14px;
    border: none;
    margin-top: 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  pre.command-output {
    background: #f3f3f3;
    padding: 10px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="top-nav">
  <a href="../"><img src="../images/m_logo.png" class="left-logo"></a>
  <a href="../"><img src="../images/TOP textlogo.png" class="menu-icon"></a>
  <a href="../special/"><img src="../images/special textlogo.png" class="menu-icon"></a>
  <a href="../items/"><img src="../images/item textlogo.png" class="menu-icon"></a>
  <a href="../enemy/"><img src="../images/enemy textlogo.png" class="menu-icon"></a>
  <a href="../friendly/"><img src="../images/friendly textlogo.png" class="menu-icon"></a>
</div>

<div class="container">
<div class="card">

  <div class="title-wrap">
    <img src="../images/friendly textlogo.png" class="title-logo-big">
  </div>

  <label>召喚するMOBを選択：</label>
  <select id="mobSelect">
    <option value="">選択してください</option>

    <!-- オーバーワールド -->
    <option disabled>―― オーバーワールド ――</option>
    <option value="allay">アレイ</option>
    <option value="armadillo">アルマジロ</option>
    <option value="cow">牛</option>
    <option value="wolf">オオカミ</option>
    <option value="tame_wolf">懐いているオオカミ</option>
    <option value="chicken">ニワトリ</option>
    <option value="horse">馬</option>
    <option value="donkey">ロバ</option>
    <option value="llama">ラマ</option>
    <option value="fox">キツネ</option>
    <option value="cat">猫</option>
    <option value="tame_cat">懐いている猫</option>
    <option value="sheep">羊</option>
    <option value="pig">豚</option>
    <option value="goat">ヤギ</option>
    <option value="rabbit">ウサギ</option>
    <option value="villager">村人</option>
    <option value="panda">パンダ</option>
    <option value="mooshroom">ムーシュルーム</option>
    <option value="sniffer">スニッファー</option>
    <option value="iron_golem">アイアンゴーレム</option>
    <option value="polar_bear">シロクマ</option>
    <option value="baby_polar_bear">シロクマの子供</option>
    <option value="ocelot">ヤマネコ</option>

    <!-- 水中 -->
    <option disabled>―― 水中 ――</option>
    <option value="axolotl">ウーパールーパー</option>
    <option value="dolphin">イルカ</option>
    <option value="turtle">カメ</option>
    <option value="pufferfish">フグ</option>
    <option value="salmon">サケ</option>
    <option value="cod">タラ</option>
    <option value="tropical_fish">熱帯魚</option>
    <option value="squid">イカ</option>
    <option value="glow_squid">ヒカリイカ</option>

    <!-- ネザー -->
    <option disabled>―― ネザー ――</option>
    <option value="strider">ストライダー</option>

    <!-- その他 -->
    <option disabled>―― その他 ――</option>
    <option value="parrot">オウム</option>
    <option value="frog">カエル</option>
    <option value="tadpole">オタマジャクシ</option>
    <option value="bee">蜂</option>
    <option value="snow_golem">スノーゴーレム</option>
    <option value="wandering_trader">行商人</option>
    <option value="trader_llama">行商人のラマ</option>
  </select>

  <button class="button" onclick="generateFriendly()">コマンドを生成</button>

  <pre class="command-output" id="output"></pre>
  <button class="copy-btn" onclick="copyCommand()">コピー</button>

</div>
</div>

<script>
function generateFriendly() {
  const mob = document.getElementById("mobSelect").value;
  let cmd = "";

  if (!mob) {
    document.getElementById("output").textContent = "MOBを選択してください。";
    return;
  }

  if (mob === "tame_wolf") {
    cmd = `execute as @p at @p run summon wolf ~ ~ ~ {variant:ashen,Owner:"{playername}",CustomName:'{"text":"{nickname}"}',PersistenceRequired:1,CustomNameVisible:1}`;
  } else if (mob === "tame_cat") {
    cmd = `execute as @p at @p run summon cat ~ ~ ~ {Owner:"{playername}",CustomName:'{"text":"{nickname}"}',PersistenceRequired:1,CustomNameVisible:1}`;
  } else if (mob === "iron_golem") {
    cmd = `execute at @p run summon iron_golem ~ ~2 ~4 {CustomName:'{"text":"{nickname}"}',PersistenceRequired:1,CustomNameVisible:1}`;
  } else if (mob === "baby_polar_bear") {
    cmd = `execute at @p run summon polar_bear ~ ~2 ~4 {Age:-24000,CustomName:'{"text":"{nickname}"}',PersistenceRequired:1,CustomNameVisible:1}`;
  } else {
    cmd = `execute at @p run summon ${mob} ~ ~2 ~4 {CustomName:'{"text":"{nickname}"}',PersistenceRequired:1,CustomNameVisible:1}`;
  }

  document.getElementById("output").textContent = cmd;
}

function copyCommand() {
  const text = document.getElementById("output").textContent;
  if (!text) return;

  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);

  alert("📋 コマンドをコピーしました！");
}
</script>

</body>
</html>
