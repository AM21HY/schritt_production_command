<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイテムコマンド</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
  body { margin: 0; font-family: 'Noto Sans JP', sans-serif; }

  .top-nav {
    display: flex; align-items: center; gap: 30px;
    padding: 10px 20px 30px 20px;
  }

  .left-logo { height: 50px; }
  .menu-icon { height: 150px; }

  .container { max-width: 600px; margin: 40px auto; text-align: center; }

  .card {
    background: #fff; padding: 30px 20px;
    border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    text-align: left;
  }

  .title-wrap { display: flex; justify-content: center; margin-bottom: 1px; }
  .title-logo-big { height: 180px; display: block; }

  select, input[type=number] {
    width: 100%; margin: 10px 0; padding: 8px; font-size: 15px;
  }

  button.button {
    width: 100%; padding: 10px; margin-top: 8px; font-size: 16px;
    border-radius: 6px; border: none; background-color: #2196F3;
    color: #fff; cursor: pointer;
  }

  .copy-btn {
    background: #4CAF50; color: #fff; padding: 8px 14px;
    border: none; margin-top: 8px; border-radius: 6px; cursor: pointer;
  }

  pre.command-output {
    background: #f3f3f3; padding: 10px; border-radius: 6px;
    white-space: pre-wrap; word-break: break-word; overflow-x: auto;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="top-nav">
  <a href="../"><img src="../images/m_logo.png" class="left-logo" alt="TOP"></a>

  <a href="../"><img src="../images/TOP textlogo.png" class="menu-icon"></a>
  <a href="../special/"><img src="../images/special textlogo.png" class="menu-icon"></a>
  <a href="../items/"><img src="../images/item textlogo.png" class="menu-icon"></a>
  <a href="../enemy/"><img src="../images/enemy textlogo.png" class="menu-icon"></a>
  <a href="../friendly/"><img src="../images/friendly textlogo.png" class="menu-icon"></a>
</div>

<div class="container">
<div class="card">

  <div class="title-wrap">
    <img src="../images/item textlogo.png" class="title-logo-big" alt="アイテムタイトル">
  </div>

  <label>アイテムを選択：</label>
  <select id="itemSelect" onchange="toggleAmount()">
<option value="">選択してください</option>

<!-- 食べ物 / 消耗品 -->
<option disabled>―― 食べ物 / 消耗品 ――</option>
<option value="enchanted_golden_apple">エンチャント金リンゴ</option>
<option value="golden_apple">金のリンゴ</option>
<option value="cookie">クッキー</option>
<option value="cooked_beef">ステーキ</option>
<option value="beetroot">ビートルート</option>
<option value="beetroot_seeds">ビートルートの種</option>
<option value="wheat">小麦</option>
<option value="wheat_seeds">小麦の種</option>
<option value="hay_block">小麦の俵</option>
<option value="baked_potato">焼きじゃがいも</option>
<option value="cooked_porkchop">焼き豚</option>
<option value="potato">じゃがいも</option>
<option value="carrot">にんじん</option>
<option value="cactus">サボテン</option>
<option value="cocoa_beans">カカオ豆</option>
<option value="melon">スイカ</option>
<option value="melon_seeds">スイカの種</option>
<option value="pumpkin">カボチャ</option>
<option value="pumpkin_seeds">カボチャの種</option>
<option value="dried_kelp">乾燥した昆布</option>
<option value="bread">パン</option>

<!-- 素材 / 鉱石 -->
<option disabled>―― 素材 / 鉱石 ――</option>
<option value="amethyst_shard">アメジスト</option>
<option value="gold_ingot">金インゴット</option>
<option value="copper_ingot">銅インゴット</option>
<option value="diamond">ダイヤ</option>
<option value="iron_ingot">鉄インゴット</option>
<option value="netherite_ingot">ネザライトインゴット</option>
<option value="netherite_scrap">ネザライトのかけら</option>
<option value="lapis_lazuli">ラピスラズリ</option>
<option value="redstone">レッドストーン</option>

<!-- 木材 / ブロック -->
<option disabled>―― 木材 / ブロック ――</option>
<option value="oak_log">オークの原木</option>
<option value="scaffolding">足場</option>
<option value="glass">ガラス</option>
<option value="ladder">はしご</option>
<option value="white_wool">白の羊毛</option>
<option value="white_carpet">白色のカーペット</option>

<!-- 武器（数量なし） -->
<option disabled>―― 武器 ――</option>
<option value="diamond_sword">ダイヤの剣</option>
<option value="trident">トライデント</option>
<option value="iron_sword">鉄の剣</option>
<option value="mace">メイス</option>
<option value="bow">弓</option>
<option value="crossbow">クロスボウ</option>

<!-- ツール（数量なし） -->
<option disabled>―― ツール ――</option>
<option value="brush">ブラシ</option>
<option value="spyglass">望遠鏡</option>
<option value="flint_and_steel">火打ち石と打ち金</option>
<option value="diamond_axe">ダイヤの斧</option>
<option value="diamond_pickaxe">ダイヤのツルハシ</option>
<option value="diamond_shovel">ダイヤのシャベル</option>
<option value="iron_axe">鉄の斧</option>
<option value="iron_pickaxe">鉄のツルハシ</option>
<option value="iron_shovel">鉄のシャベル</option>

<!-- 防具（数量なし） -->
<option disabled>―― 防具 ――</option>
<option value="elytra">エリトラ</option>
<option value="shield">盾</option>
<option value="diamond_helmet">ダイヤ防具：ヘルメット</option>
<option value="diamond_chestplate">ダイヤ防具：チェストプレート</option>
<option value="diamond_leggings">ダイヤ防具：レギンス</option>
<option value="diamond_boots">ダイヤ防具：ブーツ</option>

<!-- 投擲 / 弾系 -->
<option disabled>―― 投擲 / 弾系 ――</option>
<option value="ender_pearl">エンダーパール</option>
<option value="arrow">矢</option>
<option value="snowball">雪玉</option>

<!-- バケツ -->
<option disabled>―― バケツ ――</option>
<option value="axolotl_bucket">ウーパールーパー入りバケツ</option>
<option value="bucket">バケツ</option>
<option value="milk_bucket">牛乳入りバケツ</option>
<option value="water_bucket">水入りバケツ</option>
<option value="lava_bucket">溶岩バケツ</option>

<!-- 移動 -->
<option disabled>―― 移動 ――</option>
<option value="oak_boat">ボート</option>
<option value="lead">リード</option>
<option value="saddle">サドル</option>
<option value="compass">コンパス</option>
<option value="map">地図</option>
<option value="clock">時計</option>

<!-- 特殊 / その他 -->
<option disabled>―― 特殊 / その他 ――</option>
<option value="ender_chest">エンダーチェスト</option>
<option value="command_block">コマンドブロック</option>
<option value="shulker_box">シュルカーボックス</option>
<option value="name_tag">名札</option>
<option value="book">本</option>
<option value="torch">松明</option>
<option value="coal">石炭</option>
<option value="sugar_cane">サトウキビ</option>

<!-- 花火 -->
<option disabled>―― 花火 ――</option>
<option value="firework_rocket_1">ロケット花火Lv1</option>
<option value="firework_rocket_2">ロケット花火Lv2</option>
<option value="firework_rocket_3">ロケット花火Lv3</option>

  </select>

  <div id="amountBox" style="display:none;">
    <label>個数：</label>
    <input type="number" id="amount" min="1" max="64" value="1">
  </div>

  <button class="button" onclick="generateItem()">コマンドを生成</button>

  <pre class="command-output" id="output"></pre>
  <button class="copy-btn" onclick="copyCommand()">コピー</button>

</div>
</div>

<script>
function toggleAmount() {
  const item = document.getElementById("itemSelect").value;

  const amountItems = [
    "enchanted_golden_apple","golden_apple","cookie","cooked_beef","beetroot","beetroot_seeds",
    "wheat","wheat_seeds","hay_block","baked_potato","cooked_porkchop","potato","carrot","cactus",
    "cocoa_beans","melon","melon_seeds","pumpkin","pumpkin_seeds","dried_kelp","bread",

    "amethyst_shard","gold_ingot","copper_ingot","diamond","iron_ingot",
    "netherite_ingot","netherite_scrap","lapis_lazuli","redstone",

    "oak_log","scaffolding","glass","ladder","white_wool","white_carpet",

    "arrow","snowball",

    "bucket","milk_bucket","water_bucket","lava_bucket",

    "torch","coal","sugar_cane","book",

    "firework_rocket_1","firework_rocket_2","firework_rocket_3"
  ];

  if (item === "ender_pearl") {
    amountBox.style.display = "block";
    amount.max = 16;
    return;
  }

  if (amountItems.includes(item)) {
    amountBox.style.display = "block";
    amount.max = 64;
    return;
  }

  amountBox.style.display = "none";
}

function generateItem() {
  const item = document.getElementById("itemSelect").value;

  let maxVal = (item === "ender_pearl") ? 16 : 64;
  const num = Math.min(Math.max(parseInt(amount.value||1),1),maxVal);

  if (!item) {
    output.textContent = "";
    return;
  }

  let cmd = "";

  switch(item){

    /* ▼ 数量アイテム */
    case "enchanted_golden_apple": cmd = `/give @p enchanted_golden_apple ${num}`; break;
    case "golden_apple": cmd = `/give @p golden_apple ${num}`; break;
    case "cookie": cmd = `/give @p cookie ${num}`; break;
    case "cooked_beef": cmd = `/give @p cooked_beef ${num}`; break;
    case "beetroot": cmd = `/give @p beetroot ${num}`; break;
    case "beetroot_seeds": cmd = `/give @p beetroot_seeds ${num}`; break;
    case "wheat": cmd = `/give @p wheat ${num}`; break;
    case "wheat_seeds": cmd = `/give @p wheat_seeds ${num}`; break;
    case "hay_block": cmd = `/give @p hay_block ${num}`; break;
    case "baked_potato": cmd = `/give @p baked_potato ${num}`; break;
    case "cooked_porkchop": cmd = `/give @p cooked_porkchop ${num}`; break;
    case "potato": cmd = `/give @p potato ${num}`; break;
    case "carrot": cmd = `/give @p carrot ${num}`; break;
    case "cactus": cmd = `/give @p cactus ${num}`; break;
    case "cocoa_beans": cmd = `/give @p cocoa_beans ${num}`; break;
    case "melon": cmd = `/give @p melon ${num}`; break;
    case "melon_seeds": cmd = `/give @p melon_seeds ${num}`; break;
    case "pumpkin": cmd = `/give @p pumpkin ${num}`; break;
    case "pumpkin_seeds": cmd = `/give @p pumpkin_seeds ${num}`; break;
    case "dried_kelp": cmd = `/give @p dried_kelp ${num}`; break;
    case "bread": cmd = `/give @p bread ${num}`; break;

    case "amethyst_shard": cmd = `/give @p amethyst_shard ${num}`; break;
    case "gold_ingot": cmd = `/give @p gold_ingot ${num}`; break;
    case "copper_ingot": cmd = `/give @p copper_ingot ${num}`; break;
    case "diamond": cmd = `/give @p diamond ${num}`; break;
    case "iron_ingot": cmd = `/give @p iron_ingot ${num}`; break;
    case "netherite_ingot": cmd = `/give @p netherite_ingot ${num}`; break;
    case "netherite_scrap": cmd = `/give @p netherite_scrap ${num}`; break;
    case "lapis_lazuli": cmd = `/give @p lapis_lazuli ${num}`; break;
    case "redstone": cmd = `/give @p redstone ${num}`; break;

    case "oak_log": cmd = `/give @p oak_log ${num}`; break;
    case "scaffolding": cmd = `/give @p scaffolding ${num}`; break;
    case "glass": cmd = `/give @p glass ${num}`; break;
    case "ladder": cmd = `/give @p ladder ${num}`; break;
    case "white_wool": cmd = `/give @p white_wool ${num}`; break;
    case "white_carpet": cmd = `/give @p white_carpet ${num}`; break;

    case "arrow": cmd = `/give @p arrow ${num}`; break;
    case "snowball": cmd = `/give @p snowball ${num}`; break;

    case "bucket": cmd = `/give @p bucket ${num}`; break;
    case "milk_bucket": cmd = `/give @p milk_bucket ${num}`; break;
    case "water_bucket": cmd = `/give @p water_bucket ${num}`; break;
    case "lava_bucket": cmd = `/give @p lava_bucket ${num}`; break;

    case "torch": cmd = `/give @p torch ${num}`; break;
    case "coal": cmd = `/give @p coal ${num}`; break;
    case "sugar_cane": cmd = `/give @p sugar_cane ${num}`; break;

    case "book": cmd = `/give @p book ${num}`; break;

    /* ▼ 花火（数量あり） */
    case "firework_rocket_1": cmd = `/give @p firework_rocket{Fireworks:{Flight:1}} ${num}`; break;
    case "firework_rocket_2": cmd = `/give @p firework_rocket{Fireworks:{Flight:2}} ${num}`; break;
    case "firework_rocket_3": cmd = `/give @p firework_rocket{Fireworks:{Flight:3}} ${num}`; break;

    /* ▼ 数量なしアイテム */
    case "diamond_sword": cmd = `/give @p diamond_sword`; break;
    case "trident": cmd = `/give @p trident`; break;
    case "iron_sword": cmd = `/give @p iron_sword`; break;
    case "mace": cmd = `/give @p mace`; break;
    case "bow": cmd = `/give @p bow`; break;
    case "crossbow": cmd = `/give @p crossbow`; break;

    case "diamond_axe": cmd = `/give @p diamond_axe`; break;
    case "diamond_pickaxe": cmd = `/give @p diamond_pickaxe`; break;
    case "diamond_shovel": cmd = `/give @p diamond_shovel`; break;
    case "iron_axe": cmd = `/give @p iron_axe`; break;
    case "iron_pickaxe": cmd = `/give @p iron_pickaxe`; break;
    case "iron_shovel": cmd = `/give @p iron_shovel`; break;

    case "shield": cmd = `/give @p shield`; break;
    case "elytra": cmd = `/give @p elytra`; break;
    case "diamond_helmet": cmd = `/item replace entity @p armor.head with diamond_helmet`; break;
    case "diamond_chestplate": cmd = `/item replace entity @p armor.chest with diamond_chestplate`; break;
    case "diamond_leggings": cmd = `/item replace entity @p armor.legs with diamond_leggings`; break;
    case "diamond_boots": cmd = `/item replace entity @p armor.feet with diamond_boots`; break;

    case "brush": cmd = `/give @p brush`; break;
    case "spyglass": cmd = `/give @p spyglass`; break;
    case "flint_and_steel": cmd = `/give @p flint_and_steel`; break;

    case "ender_chest": cmd = `/give @p ender_chest`; break;
    case "command_block": cmd = `/give @p command_block`; break;
    case "shulker_box": cmd = `/give @p shulker_box`; break;
    case "name_tag": cmd = `/give @p name_tag`; break;

    case "oak_boat": cmd = `/give @p oak_boat`; break;
    case "lead": cmd = `/give @p lead`; break;
    case "saddle": cmd = `/give @p saddle`; break;
    case "map": cmd = `/give @p map`; break;
    case "compass": cmd = `/give @p compass`; break;
    case "clock": cmd = `/give @p clock`; break;

    case "axolotl_bucket": cmd = `/give @p axolotl_bucket`; break;

    /* ▼ エンダーパール（特別） */
    case "ender_pearl":
      cmd = `/give @p ender_pearl ${num}`;
      break;
  }

  document.getElementById("output").textContent = cmd;
}

function copyCommand(){
  const text = document.getElementById("output").textContent;
  if (!text) return;
  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  alert("📋 コマンドをコピーしました！");
}
</script>

</body>
</html>
